---
# Grafana Alloy — log collection agent. Successor to Grafana Agent and
# Promtail. Runs as a DaemonSet on every node, tails container logs from
# /var/log/pods, enriches them with k8s metadata, ships to Loki.
#
# Pinning chart version 0.10.0 (Alloy 1.5.x).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: alloy
      version: "0.10.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      type: daemonset
      # Run on EVERY node — we need logs from app nodes too, not just obs.
      tolerations:
        - operator: Exists

    alloy:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

      # The Alloy "river" config — discovers k8s pods, tails their stdout
      # logs, attaches namespace/pod/container labels, ships to Loki.
      configMap:
        create: true
        content: |-
          // ----- Discover all pods on this node -----
          discovery.kubernetes "pods" {
            role = "pod"
            selectors {
              role  = "pod"
              field = "spec.nodeName=" + sys.env("HOSTNAME")
            }
          }

          // ----- Build per-pod labels for Loki streams -----
          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app"]
              target_label  = "app"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app_name"
            }
            // Tag the cluster + node for multi-cluster scenarios later.
            rule {
              target_label = "cluster"
              replacement  = "personal-il-jerusalem-1"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
          }

          // ----- Tail the log files for those pods -----
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.default.receiver]
          }

          // ----- Send everything to our Loki -----
          loki.write "default" {
            endpoint {
              url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

    # Alloy needs to read pod logs from the host filesystem.
    # The host paths /var/log/pods and /var/lib/docker/containers are mounted
    # by the chart by default; the privileged PSS allows it.
    serviceMonitor:
      enabled: true
