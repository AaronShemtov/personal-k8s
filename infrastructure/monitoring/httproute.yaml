---
# Route grafana.1ms.my through the same Envoy Gateway + Cloudflare Tunnel
# as the other sites. Cloudflare provides edge TLS; in-cluster traffic
# is HTTP.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - "grafana.1ms.my"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          port: 80
