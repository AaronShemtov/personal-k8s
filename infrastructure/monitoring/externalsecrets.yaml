---
# Grafana admin password — set on every Grafana pod start as the admin user
# credentials. ESO reconciles this every 1h; rotation in OCI Vault propagates
# automatically.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin-user: admin
        admin-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: grafana-admin-password
---
# Grafana session encryption key. Used to encrypt the cookie that keeps the
# admin signed in across browser restarts. Long random string — rotate only
# when forced; rotation invalidates every active session.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-secret-key
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: grafana-secret-key
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: grafana-secret-key
---
# Alertmanager YAML config. Stored in Vault so the routing / receivers can be
# updated without a git commit. For Phase 1 it's just a no-op receiver
# ("devnull"); we wire Telegram in a later iteration.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    # The kube-prometheus-stack chart looks for a Secret named exactly
    # "alertmanager-<release>" with a key "alertmanager.yaml".
    name: alertmanager-kube-prometheus-stack-alertmanager
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        alertmanager.yaml: "{{ .config }}"
  data:
    - secretKey: config
      remoteRef:
        key: alertmanager-config
