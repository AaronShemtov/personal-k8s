---
# Binds the name "eg" to the Envoy Gateway controller. Gateway resources
# reference this via gatewayClassName: eg.
#
# parametersRef points to an EnvoyProxy resource that customises the data
# plane — in our case to use ClusterIP service (no OCI Load Balancer).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: cluster-proxy
    namespace: envoy-gateway-system