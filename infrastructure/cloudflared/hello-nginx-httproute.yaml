---
# HTTPRoute is the Gateway API resource that tells Envoy: "for this hostname,
# send traffic to this backend Service". One Gateway can have many HTTPRoutes
# attached — each app will get its own.
#
# This HTTPRoute is in namespace cloudflare (same as backend), but it attaches
# to the Gateway in envoy-gateway-system via parentRefs. This cross-namespace
# attachment is allowed because the Gateway uses allowedRoutes.namespaces.from: All.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-nginx
  namespace: cloudflare
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: http     # the listener named "http" on port 80
  hostnames:
    - "1ms.my"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello-nginx
          port: 80