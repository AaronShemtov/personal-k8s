---
# Pulls the Cloudflare Tunnel token from OCI Vault and materialises it as a
# native Kubernetes Secret named "cloudflared-tunnel-token" in this namespace.
#
# The cloudflared Deployment (next step) will consume this Secret via:
#   env:
#     - name: TUNNEL_TOKEN
#       valueFrom:
#         secretKeyRef:
#           name: cloudflared-tunnel-token
#           key:  token
#
# refreshInterval: 1h means ESO re-reads from Vault every hour. If you rotate
# the token in Vault, the new value propagates within 1h without manual ops.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: cloudflared-tunnel-token   # name of the k8s Secret to create
    creationPolicy: Owner            # ESO owns and manages this Secret
  data:
    - secretKey: token               # key inside the k8s Secret
      remoteRef:
        # OCID of the secret in OCI Vault
        key: ocid1.vaultsecret.oc1.il-jerusalem-1.amaaaaaah2isaqaakmiogzigmhvkiwjjtdehelf3nikfvp7vbcsph7dqscwa