---
# Pulls the Cloudflare Tunnel token from OCI Vault and materialises it as a
# native Kubernetes Secret named "cloudflared-tunnel-token" in this namespace.
#
# IMPORTANT: ESO Oracle provider uses the OCI API "GetSecretBundleByName",
# so remoteRef.key must be the secret NAME (as shown in OCI Vault console),
# NOT the OCID. The vault to search is taken from ClusterSecretStore.
#
# The cloudflared Deployment (next step) will consume this Secret via:
#   env:
#     - name: TUNNEL_TOKEN
#       valueFrom:
#         secretKeyRef:
#           name: cloudflared-tunnel-token
#           key:  token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        # Name of the secret in OCI Vault
        key: cloudflared-tunnel-token