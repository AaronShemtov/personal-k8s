---
# Cluster-wide reference to OCI Vault. Any ExternalSecret in any namespace
# can reference this store via spec.secretStoreRef.
#
# Authentication: Instance Principal — ESO controller pod authenticates
# as the OKE worker node it runs on. The Dynamic Group oke-urlshortener-nodes
# (matching nodes in compartment "personal") has policy
# "use secret-family in compartment personal", which is sufficient to read
# any secret in personal-vault.
#
# No static credentials, no .pem keys, no secret-of-secrets bootstrap problem.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: oci-vault
spec:
  provider:
    oracle:
      vault: ocid1.vault.oc1.il-jerusalem-1.hzvbd5tmaaatc.abwxiljrp27qfw44ua4jvugo25a42ydaasbwz4qzmfzkbvym54whglrjk5va
      region: il-jerusalem-1
      principalType: InstancePrincipal