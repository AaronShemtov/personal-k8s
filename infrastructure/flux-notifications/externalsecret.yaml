---
# Telegram bot TOKEN reconciled from OCI Vault into a Kubernetes Secret.
#
# Only the bot token lives in the Secret. The channel chat_id is set
# in the Provider's spec.channel field directly — it's not a secret,
# just a routing destination.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-credentials
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: telegram-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: telegram-bot-token