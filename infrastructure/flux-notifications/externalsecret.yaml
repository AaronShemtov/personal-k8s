---
# Telegram bot credentials reconciled from OCI Vault into a Kubernetes
# Secret that Flux notification-controller can consume.
#
# Two Vault secrets feed this:
#   * telegram-bot-token — same token used by the GitHub Actions workflows
#   * telegram-chat-id   — channel numeric ID (the -100... one)
#
# The chart key "address" must hold the chat ID directly (Flux's Provider
# of type=telegram reads `address` as the destination chat). The "token"
# key holds the bot token.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-credentials
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: telegram-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .token }}"
        address: "{{ .chat_id }}"
  data:
    - secretKey: token
      remoteRef:
        key: telegram-bot-token
    - secretKey: chat_id
      remoteRef:
        key: telegram-chat-id
