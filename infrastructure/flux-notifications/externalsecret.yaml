---
# Reconcile bot token from Vault into the same Secret that also carries
# a STATIC chat_id ("address"). The chat_id is not a secret — it's the
# channel routing target, fine to commit in plain text.
#
# Why both keys live in one Secret: Flux's Telegram notifier reads BOTH
# from Provider.spec.secretRef. The notifier looks for:
#   * data.token   — bot API token  (real secret, from Vault)
#   * data.address — chat_id        (static, hardcoded in template below)
#
# ESO templates support both Go-template substitution AND literal values.
# We put `address` as a literal, `token` is templated from the remote ref.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-credentials
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: telegram-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Bot token comes from Vault (real secret).
        token: "{{ .token }}"
        # Channel chat_id is static (not a secret). Hardcoded here so we
        # don't need a Vault entry for it — and so it doesn't disappear
        # if someone accidentally cleans the Vault secret.
        address: "-1003921436547"
  data:
    - secretKey: token
      remoteRef:
        key: telegram-bot-token