---
# Only the bot token comes from Vault. Channel/chat_id is set directly
# in the Provider manifest, not in the Secret (Telegram notifier reads
# it from spec.channel per the controller's NewTelegram code).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-credentials
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: telegram-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: telegram-bot-token