---
# Flux Telegram Provider.
#
# Per the upstream telegram.go source:
#   func NewTelegram(proxyURL, channel, token string)
# The `channel` parameter is what gets validated against "" and becomes
# the error "empty Telegram channel". It comes from spec.channel on the
# Provider, NOT from a key in the Secret.
#
# The Secret needs only `data.token`.
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: telegram
  namespace: flux-system
spec:
  type: telegram
  channel: "-1003921436547"
  secretRef:
    name: telegram-credentials
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: telegram-cluster-events
  namespace: flux-system
spec:
  providerRef:
    name: telegram
  eventSeverity: info
  eventSources:
    - kind: HelmRelease
      name: '*'
    - kind: Kustomization
      name: '*'
    - kind: ImagePolicy
      name: '*'
    - kind: ImageUpdateAutomation
      name: '*'
  exclusionList:
    - "no new tags"
    - "no updates made"