---
# Flux Provider for Telegram.
#
# spec.channel — the destination chat_id. For channels this is the
# negative -100... number. Not a secret; it's the routing target.
#
# spec.secretRef — points to the Secret carrying only the bot token
# (key: token).
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: telegram
  namespace: flux-system
spec:
  type: telegram
  channel: "-1003921436547"
  secretRef:
    name: telegram-credentials
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: telegram-cluster-events
  namespace: flux-system
spec:
  providerRef:
    name: telegram
  eventSeverity: info
  eventSources:
    - kind: HelmRelease
      name: '*'
    - kind: Kustomization
      name: '*'
    - kind: ImageRepository
      name: '*'
    - kind: ImagePolicy
      name: '*'
    - kind: ImageUpdateAutomation
      name: '*'
  exclusionList:
    - "no new tags"
    - "no updates made"