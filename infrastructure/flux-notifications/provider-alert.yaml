---
# Flux Telegram Provider. Both bot token AND chat_id come from the
# Secret referenced here — see externalsecret.yaml for how the Secret
# is populated.
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: telegram
  namespace: flux-system
spec:
  type: telegram
  secretRef:
    name: telegram-credentials
---
# Single consolidated Alert covering release events.
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: telegram-cluster-events
  namespace: flux-system
spec:
  providerRef:
    name: telegram
  eventSeverity: info
  eventSources:
    - kind: HelmRelease
      name: '*'
    - kind: Kustomization
      name: '*'
    - kind: ImagePolicy
      name: '*'
    - kind: ImageUpdateAutomation
      name: '*'
  exclusionList:
    - "no new tags"
    - "no updates made"