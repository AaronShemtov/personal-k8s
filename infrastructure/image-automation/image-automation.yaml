---
# Image Automation pipeline for all sites.
#
# Each tracked OCIR repo gets:
#   - ImageRepository — Flux scans the registry every 2 minutes
#   - ImagePolicy     — picks the highest tag matching semver `>=0.0.0`
#
# A single ImageUpdateAutomation at the bottom watches every Deployment YAML
# under ./applications (any namespace, any subfolder) for the marker
# `# {"$imagepolicy": "flux-system:<policy-name>"}` and bumps the tag.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: urlshortener-backend
  namespace: flux-system
spec:
  image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-backend
  interval: 2m
  secretRef:
    name: ocir-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: urlshortener-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: urlshortener-backend
  policy:
    semver:
      range: '>=0.0.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: urlshortener-frontend
  namespace: flux-system
spec:
  image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-frontend
  interval: 2m
  secretRef:
    name: ocir-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: urlshortener-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: urlshortener-frontend
  policy:
    semver:
      range: '>=0.0.0'
