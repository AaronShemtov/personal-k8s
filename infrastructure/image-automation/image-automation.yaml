---
# Reuses the flux-system GitRepository (SSH deploy key with write access),
# so the same credentials Flux uses to PULL manifests also let it PUSH
# tag-bump commits.
#
# Path is the whole ./applications tree — covers urlshortener/, cv/, and any
# future subfolder. The automation only edits files containing the marker
# comment, so subfolders without markers are ignored.
#
# NOTE: the agent's Deployment lives under ./infrastructure, NOT ./applications,
# so this automation does NOT currently bump the agent's tag automatically.
# The ImageRepository/ImagePolicy above still let you query the latest tag and
# can drive a separate automation later; for now the agent pins :latest and a
# rollout restart picks up the newest :latest after each build.
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: urlshortener
  namespace: flux-system
spec:
  interval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@1ms.my
        name: Flux Image Automation
      messageTemplate: |
        chore(images): bump

        {{ range .Updated.Images -}}
        - {{ . }}
        {{ end -}}
    push:
      branch: main
  update:
    strategy: Setters
    path: ./applications