---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: urlshortener-backend
  namespace: flux-system
spec:
  image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-backend
  interval: 2m
  secretRef:
    name: ocir-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: urlshortener-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: urlshortener-backend
  policy:
    semver:
      range: '>=0.0.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: urlshortener-frontend
  namespace: flux-system
spec:
  image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-frontend
  interval: 2m
  secretRef:
    name: ocir-pull-secret
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: urlshortener-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: urlshortener-frontend
  policy:
    semver:
      range: '>=0.0.0'
---
# Simplified commit message template — iterates over Updated.Images as a slice,
# letting each element stringify itself via the ImageRef.String() method.
apiVersion: image.toolkit.fluxcd.io/v1beta1
kind: ImageUpdateAutomation
metadata:
  name: urlshortener
  namespace: flux-system
spec:
  interval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@1ms.my
        name: Flux Image Automation
      messageTemplate: |
        chore(images): bump urlshortener

        {{ range .Updated.Images -}}
        - {{ . }}
        {{ end -}}
    push:
      branch: main
  update:
    strategy: Setters
    path: ./applications/urlshortener