---
# OCIR pull secret in flux-system namespace, sourced from OCI Vault via ESO.
# image-reflector-controller uses this to authenticate when scanning OCIR for
# new image tags.
#
# Identical structure to the imagepull-externalsecret in applications/urlshortener/,
# but lives in flux-system because that's where image-reflector-controller runs.
# OCIR credentials don't change often, so we duplicate the ExternalSecret rather
# than introducing cross-namespace Secret sharing complexity.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocir-pull-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: ocir-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "il-jerusalem-1.ocir.io": {
                "username": "axiwhc5fgu9i/shemtov.aaron@gmail.com",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" "axiwhc5fgu9i/shemtov.aaron@gmail.com" .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: password
      remoteRef:
        key: ocir-auth-token