---
# Same shape as applications/urlshortener/imagepull-externalsecret.yaml.
# OCIR pull credentials are per-namespace in Kubernetes, so we duplicate
# the ExternalSecret rather than introducing cross-namespace secret sharing.
# Source-of-truth is OCI Vault — the secret `ocir-auth-token` is the single
# place to rotate the token.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocir-pull-secret
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: ocir-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "il-jerusalem-1.ocir.io": {
                "username": "axiwhc5fgu9i/shemtov.aaron@gmail.com",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" "axiwhc5fgu9i/shemtov.aaron@gmail.com" .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: password
      remoteRef:
        key: ocir-auth-token
