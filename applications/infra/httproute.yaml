---
# Routes all traffic for hostname infra.1ms.my to the infra-frontend Service.
#
# parentRefs references the same homelab-gateway that handles 1ms.my,
# so a single Envoy data-plane handles all hostnames — Cloudflare Tunnel
# already forwards infra.1ms.my to this same Envoy data-plane service.
#
# The Gateway has `allowedRoutes.namespaces.from: All`, so HTTPRoutes from
# any namespace (including this "cv" namespace) attach without a ReferenceGrant.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infra
  namespace: infra
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - "infra.1ms.my"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: infra-frontend
          port: 80
