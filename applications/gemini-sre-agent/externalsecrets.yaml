---
# Gemini API key, reconciled from OCI Vault.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gemini-api-key
  namespace: ai-sre-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: gemini-api-key
    creationPolicy: Owner
  data:
    - secretKey: api_key
      remoteRef:
        key: gemini-api-key       # Vault secret name
---
# Telegram bot token, reconciled from the SAME Vault secret the Flux
# notifications use (telegram-bot-token). The agent and the Flux notifier
# share one bot — Telegram allows the same token to both send to a channel
# and long-poll for DMs.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-telegram-token
  namespace: ai-sre-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: agent-telegram-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: telegram-bot-token   # Vault secret name (reused)
