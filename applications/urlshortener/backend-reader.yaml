---
# Reader pods serve GET /{code} → 301 redirect.
# Read-only path: NoSQL Get, no writes possible (MODE=reader doesn't register
# POST handlers — see internal/handler/main.go).
#
# Two replicas to start. In a later iteration this becomes HPA-scaled
# based on CPU since reads are 95%+ of traffic in a URL shortener.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshortener-reader
  namespace: urlshortener
  labels:
    app: urlshortener
    component: reader
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urlshortener
      component: reader
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: urlshortener
        component: reader
    spec:
      serviceAccountName: urlshortener
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: urlshortener
                    component: reader
      containers:
        - name: backend
          image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-backend:3d10d51
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MODE
              value: reader
            - name: PORT
              value: "8080"
            - name: BASE_URL
              value: https://1ms.my
            - name: NOSQL_ENDPOINT
              value: https://nosql.il-jerusalem-1.oci.oraclecloud.com
            - name: NOSQL_TABLE
              value: urls
            - name: OCI_COMPARTMENT_OCID
              value: ocid1.compartment.oc1..aaaaaaaabdv5v3fygzdcql5avbbsc4dd5lyjglcyfi3xr2hr2scbhl4mcx2q
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: urlshortener-reader
  namespace: urlshortener
  labels:
    app: urlshortener
    component: reader
spec:
  selector:
    app: urlshortener
    component: reader
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP