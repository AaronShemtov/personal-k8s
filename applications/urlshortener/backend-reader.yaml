# Reader pods serve GET /{code} → 301 redirect.
# Read-only path: SODA REST GET, no writes possible (MODE=reader doesn't
# register POST handlers — see main.go).
#
# Two replicas to start. In a later iteration this becomes HPA-scaled
# based on CPU since reads are 95%+ of traffic in a URL shortener.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshortener-reader
  namespace: urlshortener
  labels:
    app: urlshortener
    component: reader
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urlshortener
      component: reader
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: urlshortener
        component: reader
    spec:
      serviceAccountName: urlshortener
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: urlshortener
                    component: reader
      containers:
        - name: backend
          image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-backend:0.0.4 # {"$imagepolicy": "flux-system:urlshortener-backend"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MODE
              value: reader
            - name: PORT
              value: "8080"
            - name: BASE_URL
              value: https://1ms.my
            - name: ADB_BASE_URL
              value: https://GB6D5BC088AFCDA-URLSHORTENERJSON.adb.il-jerusalem-1.oraclecloudapps.com/ords/admin/soda/latest
            - name: ADB_COLLECTION
              value: urls
            - name: ADB_USERNAME
              value: ADMIN
            - name: ADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adb-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: urlshortener-reader
  namespace: urlshortener
  labels:
    app: urlshortener
    component: reader
spec:
  selector:
    app: urlshortener
    component: reader
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
