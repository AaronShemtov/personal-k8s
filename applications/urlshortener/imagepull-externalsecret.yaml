---
# Builds an OCIR ImagePullSecret by combining:
#   - username (literal, not secret — your OCIR namespace/email)
#   - password (the auth token, stored in OCI Vault)
# into the kubernetes.io/dockerconfigjson format that k8s expects.
#
# Why a template instead of a single secretKey:
#   OCIR pull secrets aren't a single opaque string — they're a JSON blob with
#   specific structure including a base64-encoded "auth" field. ESO templates
#   build that structure on the fly using Go template syntax (Sprig functions).
#
# The username is hard-coded here because it's not secret — anyone can see it
# from the docker login command in CI logs. Only the auth token is sensitive.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocir-pull-secret
  namespace: urlshortener
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: ocir-pull-secret
    creationPolicy: Owner
    # template.type sets the resulting Secret's type field — k8s validates that
    # the .dockerconfigjson key contains a valid registry config JSON.
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "il-jerusalem-1.ocir.io": {
                "username": "axiwhc5fgu9i/shemtov.aaron@gmail.com",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" "axiwhc5fgu9i/shemtov.aaron@gmail.com" .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: password
      remoteRef:
        # Name of the secret in OCI Vault holding the OCIR auth token.
        key: ocir-auth-token