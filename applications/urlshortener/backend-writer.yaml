# Writer pods accept POST /shorten and POST /createcustom.
# They write to Oracle Autonomous JSON Database via SODA REST API.
# Auth is Basic Auth — username is the static value ADMIN, password comes
# from a k8s Secret (adb-credentials) sourced from OCI Vault via ESO.
#
# Two replicas for rolling updates: one drains while the other serves.
# Anti-affinity spreads them across different nodes (best effort) so a
# single-node outage doesn't take down writes entirely.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshortener-writer
  namespace: urlshortener
  labels:
    app: urlshortener
    component: writer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urlshortener
      component: writer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: urlshortener
        component: writer
    spec:
      serviceAccountName: urlshortener # for OCIR pull secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: urlshortener
                    component: writer
      containers:
        - name: backend
          # Flux Image Automation updates the tag on every new OCIR push.
          image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-backend:0.0.3 # {"$imagepolicy": "flux-system:urlshortener-backend"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MODE
              value: writer
            - name: PORT
              value: "8080"
            - name: BASE_URL
              value: https://1ms.my
            - name: SHORT_CODE_LENGTH
              value: "6"
            # ADB / SODA REST endpoint. Note the path includes /ords/admin/
            # — we use the ADMIN schema because Always Free ATP doesn't let
            # us cleanly REST-enable a separate user schema.
            - name: ADB_BASE_URL
              value: https://GB6D5BC088AFCDA-URLSHORTENERJSON.adb.il-jerusalem-1.oraclecloudapps.com/ords/admin/soda/latest
            - name: ADB_COLLECTION
              value: urls
            - name: ADB_USERNAME
              value: ADMIN
            - name: ADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adb-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: urlshortener-writer
  namespace: urlshortener
  labels:
    app: urlshortener
    component: writer
spec:
  selector:
    app: urlshortener
    component: writer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP