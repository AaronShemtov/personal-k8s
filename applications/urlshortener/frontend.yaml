# Frontend pods serve the static HTML/CSS/JS via nginx-unprivileged.
# No NoSQL access, no secrets needed — just serve files on port 8080.
#
# Two replicas for HA on rolling updates. Anti-affinity spreads them across nodes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshortener-frontend
  namespace: urlshortener
  labels:
    app: urlshortener
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urlshortener
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: urlshortener
        component: frontend
    spec:
      serviceAccountName: urlshortener # for OCIR pull secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: urlshortener
                    component: frontend
      containers:
        - name: nginx
          image: il-jerusalem-1.ocir.io/axiwhc5fgu9i/urlshortener-frontend:0.0.3 # {"$imagepolicy": "flux-system:urlshortener-frontend"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          # nginx-unprivileged uses UID 101 — different from backend's 65532.
          # readOnlyRootFilesystem is false because nginx writes PID/temp files.
          # The needed writable paths are emptyDir-mounted below.
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        # nginx needs to write its PID file, cache files, and temp uploads.
        # emptyDir is in-memory tmpfs by default — fast, isolated per-pod.
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: urlshortener-frontend
  namespace: urlshortener
  labels:
    app: urlshortener
    component: frontend
spec:
  selector:
    app: urlshortener
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
