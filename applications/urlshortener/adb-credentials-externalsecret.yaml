---
# Pulls the Autonomous Database ADMIN password from OCI Vault into a
# Kubernetes Secret in the urlshortener namespace.
#
# Vault secret name (in OCI Console): adb-admin-password
#   → must be created manually before this ExternalSecret reconciles.
#
# Consumed by both backend-writer and backend-reader as the env var
# ADB_PASSWORD via valueFrom.secretKeyRef.
#
# refreshInterval: 1h means the controller checks Vault every hour for
# password rotation. Pods don't restart on Secret change — the kubelet
# updates the mounted Secret in-place, but env-injected values are
# captured at pod start. Rotation therefore requires a manual rollout
# (kubectl rollout restart deploy/...) or a tool like reloader.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: adb-credentials
  namespace: urlshortener
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: adb-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        # Name of the secret in OCI Vault — NOT an OCID.
        # The ESO Oracle provider uses GetSecretBundleByName.
        key: adb-admin-password