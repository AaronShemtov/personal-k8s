---
# Routing rules (Gateway API matches by specificity, not array order):
#   /shorten, /createcustom  → writer service (writer ignores GET via mode flag)
#   /<6-char base62 code>     → reader service (regex by length excludes longer paths)
#   /, /*.ico, /*.webp, ...   → frontend service (catch-all)
#
# Removed `method: POST` matching because it requires experimental feature flag
# in Envoy Gateway 1.2.x. Path uniqueness alone is sufficient: frontend nginx
# doesn't serve /shorten or /createcustom, and the 6-char regex won't match
# longer asset paths like /websitebanner.webp.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: urlshortener
  namespace: urlshortener
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - "1ms.my"
  rules:
    # Writer endpoints — exact paths, any method.
    # Writer handler only registers POST, so a stray GET would 404 from the
    # backend itself, but that's fine — same effect as method-level routing.
    - matches:
        - path:
            type: Exact
            value: /shorten
        - path:
            type: Exact
            value: /createcustom
      backendRefs:
        - name: urlshortener-writer
          port: 80

    # Reader endpoint — short codes are exactly 6 base62 chars.
    # The $ anchor prevents matching paths with extensions or longer segments.
    - matches:
        - path:
            type: RegularExpression
            value: "^/[a-zA-Z0-9]{6}$"
      backendRefs:
        - name: urlshortener-reader
          port: 80

    # Catch-all — frontend serves "/" and static assets.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: urlshortener-frontend
          port: 80